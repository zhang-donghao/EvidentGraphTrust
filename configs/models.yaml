model: trustguard
head: evidential
n_classes: 2
embedding_dim: 128

trunk:
  target: trustcore.models.trunk.trustguard_trunk.TrustGuardTrunk
  kwargs:
    in_dim: 128
    hidden_dim: 256
    out_dim: 128
    num_layers: 3
    dropout: 0.1

data:
  builder: your_pkg.data.build_dataloaders.build_dataloaders
  root: data/bitcoin_otc
  kwargs:
    dataset_name: bitcoin_otc
    root: data/bitcoin_otc
    snapshots: 10
    split: standard
    batch_size: 1
    shuffle: false
    num_workers: 0

evidential:
  hidden: 128
  fusion: none
  lambda_disson: 0.10
  lambda_falseconf: 0.01

training:
  lr: 5.0e-3
  weight_decay: 1.0e-5
  epochs: 50
  early_stop: 8
  seed: 42

evaluation:
  protocols: [single_observed, multi_observed, single_unobserved]
  multi_horizon: 3
